# ============================================================================
# 90-day Forward Unlock Schedule (manually curated, event-level)
# ============================================================================
# Reality: no free API for on-chain vesting schedules. For a peer set of 8,
# manual curation from public tokenomics docs is the most defensible approach.
# Each entry has explicit sources + last-verified date so the figure can
# always be traced back to a primary reference. See unlocks_research.md for
# the full research log.
#
# Structure (new 2026-04-17): discrete cliff events live in `events` so the
# forward-supply-curve builder can plot them as step increases. Ongoing
# inflation/emission is kept OUT of this file — it's captured separately via
# `gross_inflation_annualized` in peer_table.csv and added as a smooth ramp
# in the forward curve (compute.compute_forward_supply_curve).
#
# As-of date:  2026-04-17
# Window:      2026-04-17 → 2026-07-16 (next 90 days)
#
# Fields:
#   symbol                    — matches peer_set.yaml
#   has_scheduled_unlocks     — true/false; if false the token is fully vested
#                               OR releases are continuous/inflationary (see
#                               counted_in_inflation).
#   events                    — list of discrete cliff events in window:
#                                 - date: YYYY-MM-DD
#                                 - tokens: <int>
#                                 - buckets: "core_contributors,investors,..."
#                                 - description: freeform
#   ninety_day_tokens         — sum of events in window (for the summary table)
#   ninety_day_pct_of_circ    — ninety_day_tokens / current circulating supply
#   cliff_vs_linear           — 'cliff' | 'linear' | 'mixed' | 'discretionary' | 'n/a'
#   insider_share_pct         — % going to team/early investors vs community
#                               (best estimate; 'n/a' if not disclosed)
#   counted_in_inflation      — true if these tokens are already reflected in
#                               gross_inflation_annualized (avoid double-count
#                               in the forward curve)
#   source_urls               — list of primary sources
#   last_verified             — YYYY-MM-DD
#   notes                     — caveats
# ============================================================================

as_of: 2026-04-17
window_days: 90
window_end: 2026-07-16

unlocks:
  - symbol: OP
    has_scheduled_unlocks: true
    events:
      - date: 2026-04-30
        tokens: 31_340_000
        buckets: core_contributors,investors
        description: >
          Monthly cliff: ~16.54M Core Contributors + ~14.8M Investors.
      - date: 2026-05-31
        tokens: 31_340_000
        buckets: core_contributors,investors
        description: >
          Monthly cliff: ~16.54M Core Contributors + ~14.8M Investors.
      - date: 2026-06-30
        tokens: 31_340_000
        buckets: core_contributors,investors
        description: >
          Monthly cliff: ~16.54M Core Contributors + ~14.8M Investors.
    ninety_day_tokens: 94_020_000
    ninety_day_pct_of_circ: 0.0440
    cliff_vs_linear: cliff
    insider_share_pct: 0.52
    counted_in_inflation: false
    source_urls:
      - https://tokenomist.ai/optimism
      - https://cryptorank.io/price/optimism/vesting
    last_verified: 2026-04-17
    notes: >
      **The headline at-risk unlock in this peer set.** Optimism's vesting
      contract was coded at genesis (May 2022) with monthly cliff releases of
      ~31.34M OP to Core Contributors and Investors. Schedule runs through 2027,
      followed by perpetual 2% annual inflation. CoinDesk does NOT track OP
      `issued` (OP uses pre-minted supply with chain-of-custody release), so
      these cliffs must be layered on top of the ~0 inflation figure to get true
      forward supply pressure.

  - symbol: LINK
    has_scheduled_unlocks: true
    events:
      - date: 2026-07-15
        tokens: 15_000_000
        buckets: treasury_discretionary
        description: >
          Expected quarterly treasury release (no hard on-chain schedule).
          Historical range: 10–20M LINK per quarter. Exact date TBD — modeled
          as mid-July based on prior quarterly cadence. April 2026 quarterly
          (~19M LINK) occurred Apr 4, just before the window opens.
    ninety_day_tokens: 15_000_000
    ninety_day_pct_of_circ: 0.0206
    cliff_vs_linear: discretionary
    insider_share_pct: n/a
    counted_in_inflation: false
    source_urls:
      - https://coinpedia.org/news/chainlink-unlocks-19m-link-165m-moved-to-market/
      - https://cryptorank.io/news/feed/6c881-chainlink-link-unlock-binance-transfer
      - https://tokenomist.ai/chainlink
    last_verified: 2026-04-17
    notes: >
      Chainlink has no on-chain vesting contract — the formal vesting schedule
      ended in 2024. ~273M LINK remain in non-circulating treasury across 24
      wallet contracts, released at Chainlink Labs' discretion. Behavioural
      pattern: quarterly releases of 10–20M LINK, ~75–80% routed to Binance,
      ~20–25% to the staking reward multisig. Amount and timing are estimates
      based on 3+ years of observed quarterly cadence; the figure is not
      contractually enforced and could be accelerated, delayed, or skipped.

