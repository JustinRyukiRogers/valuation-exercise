          DUNI service-provider agreement, via on-chain vesting contract).
    ninety_day_tokens: 5_000_000
    ninety_day_pct_of_circ: 0.0079
    cliff_vs_linear: cliff
    insider_share_pct: 1.00
    counted_in_inflation: false
    source_urls:
      - https://blog.uniswap.org/unification
      - https://vote.uniswapfoundation.org/proposals/93
      - https://tokenomist.ai/uniswap
    last_verified: 2026-04-17
    notes: >
      UNIfication (passed Dec 2025, effective Jan 1 2026) introduced a new
      20M UNI/year vesting contract distributing to Uniswap Labs as service
      provider. Q1 (Jan 1) and Q2 (~Apr 1) tranches already occurred before
      the window opens. Q3 tranche (~Jul 1) of ~5M UNI is the in-window event.
      Partially offset by the Firepit protocol-fee burn (~1M UNI burned/quarter),
      giving ~4M UNI net new supply over the window. Original 2020–2024
      four-year vesting schedule is complete. Total supply reduced from
      1B → ~900M after the 100M treasury burn on Dec 28 2025.

